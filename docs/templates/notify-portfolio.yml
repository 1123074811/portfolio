# 【可选模板】默认不需要使用。
# portfolio 已通过每小时 cron 自动轮询全部公开仓库；
# 只有当你希望「这个仓库一 push 就立刻刷新作品集」时，才复制本文件。
#
# 复制到源仓库：.github/workflows/notify-portfolio.yml
#
# 一次性配置（仅该源仓库）：
# 1. 创建 fine-grained PAT 或 classic PAT
#    - fine-grained：只勾选目标仓库 1123074811/portfolio
#      Repository permissions → Contents: Read-only（可选）
#      Repository permissions → Metadata: Read-only
#      Repository permissions → Actions: Read and write
#    若 fine-grained 不稳定，改用 classic PAT，勾选 public_repo
# 2. 在「当前这个源仓库」Settings → Secrets and variables → Actions
#    新增 Secret：PORTFOLIO_DISPATCH_TOKEN = 上面的 PAT
# 3. 放入本文件并 push
# 4. 可选：若 portfolio 不在 1123074811/portfolio，改下面 TARGET_REPO

name: Notify Portfolio

on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  notify-portfolio:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger portfolio repository_dispatch
        env:
          PORTFOLIO_DISPATCH_TOKEN: ${{ secrets.PORTFOLIO_DISPATCH_TOKEN }}
          TARGET_REPO: 1123074811/portfolio
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_REF: ${{ github.ref }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${PORTFOLIO_DISPATCH_TOKEN:-}" ]; then
            echo "::error::缺少 Secret PORTFOLIO_DISPATCH_TOKEN。请在本仓库配置可写 portfolio 的 PAT。"
            exit 1
          fi

          payload=$(printf '{"event_type":"repo-updated","client_payload":{"source_repo":"%s","ref":"%s","sha":"%s"}}' \
            "$SOURCE_REPO" "$SOURCE_REF" "$SOURCE_SHA")

          echo "Dispatching repo-updated → $TARGET_REPO"
          echo "from $SOURCE_REPO @ $SOURCE_REF ($SOURCE_SHA)"

          http_code=$(curl -sS -o /tmp/dispatch-body.txt -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${PORTFOLIO_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${TARGET_REPO}/dispatches" \
            -d "$payload")

          echo "HTTP $http_code"
          cat /tmp/dispatch-body.txt || true
          echo

          # repository_dispatch 成功时 GitHub 返回 204 No Content
          if [ "$http_code" != "204" ]; then
            echo "::error::触发 portfolio 失败（期望 HTTP 204）。请检查 PAT 权限与 TARGET_REPO。"
            exit 1
          fi

          echo "已通知 portfolio 开始刷新。"
