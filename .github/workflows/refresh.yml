name: Refresh & Deploy Portfolio

# 触发来源（推荐以高频轮询为主，跨仓 notify 仅可选）：
# 1) schedule：每小时轮询一次 GitHub 公开仓库（零跨仓配置）
# 2) push：portfolio 自身 main 更新
# 3) workflow_dispatch：手动触发
# 4) repository_dispatch：可选。仅当个别源仓库复制了 notify 模板时即时回调
on:
  schedule:
    # 每小时一次。GitHub cron 可能有几分钟延迟，但不需要给每个仓库配文件
    - cron: '0 * * * *'
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [repo-updated, portfolio-refresh]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: portfolio-deploy
  # 高频轮询或多次通知时只保留最新一次部署，避免排队堆积
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Show trigger context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "event_type=${{ github.event.action || github.event_name }}"
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "source_repo=${{ github.event.client_payload.source_repo }}"
            echo "source_ref=${{ github.event.client_payload.ref }}"
            echo "source_sha=${{ github.event.client_payload.sha }}"
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 持久化 AI 文案缓存：仓库内容没变就不重复调 DeepSeek，省钱
      - name: Restore AI cache
        uses: actions/cache@v4
        with:
          path: scripts/.cache
          key: ai-cache-${{ github.run_id }}
          restore-keys: ai-cache-

      - run: npm ci

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # 拉 GitHub 数据 + DeepSeek 生成文案 → src/data/githubData.json
      - name: Generate portfolio data from GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # 可选：覆盖 siteConfig.js 里的 username
          GITHUB_USERNAME: ${{ vars.GITHUB_USERNAME }}
        run: node scripts/generate-portfolio.mjs

      - name: Build
        env:
          # 默认走相对路径 './'，同一份 dist 可部署到 GitHub Pages 项目页和国内 CDN。
          # 如国内 CDN 固定在某个子路径，也可在仓库 Variables 设置 VITE_BASE 覆盖。
          VITE_BASE: ${{ vars.VITE_BASE }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Upload static dist artifact
        if: ${{ vars.DOMESTIC_DEPLOY_ENABLED == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-dist
          path: dist
          if-no-files-found: error

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-domestic-cdn:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ vars.DOMESTIC_DEPLOY_ENABLED == 'true' }}
    env:
      DOMESTIC_S3_PROVIDER: ${{ vars.DOMESTIC_S3_PROVIDER }}
      DOMESTIC_S3_ENDPOINT: ${{ vars.DOMESTIC_S3_ENDPOINT }}
      DOMESTIC_S3_REGION: ${{ vars.DOMESTIC_S3_REGION }}
      DOMESTIC_S3_BUCKET: ${{ vars.DOMESTIC_S3_BUCKET }}
      DOMESTIC_S3_PREFIX: ${{ vars.DOMESTIC_S3_PREFIX }}
      DOMESTIC_S3_ACCESS_KEY_ID: ${{ secrets.DOMESTIC_S3_ACCESS_KEY_ID }}
      DOMESTIC_S3_SECRET_ACCESS_KEY: ${{ secrets.DOMESTIC_S3_SECRET_ACCESS_KEY }}
    steps:
      - name: Download static dist artifact
        uses: actions/download-artifact@v4
        with:
          name: portfolio-dist
          path: dist

      - name: Validate domestic CDN config
        run: |
          test -n "$DOMESTIC_S3_PROVIDER"
          test -n "$DOMESTIC_S3_ENDPOINT"
          test -n "$DOMESTIC_S3_BUCKET"
          test -n "$DOMESTIC_S3_ACCESS_KEY_ID"
          test -n "$DOMESTIC_S3_SECRET_ACCESS_KEY"

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Sync dist to domestic OSS/COS bucket
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [domestic]
          type = s3
          provider = ${DOMESTIC_S3_PROVIDER}
          access_key_id = ${DOMESTIC_S3_ACCESS_KEY_ID}
          secret_access_key = ${DOMESTIC_S3_SECRET_ACCESS_KEY}
          endpoint = ${DOMESTIC_S3_ENDPOINT}
          region = ${DOMESTIC_S3_REGION}
          acl = public-read
          EOF

          TARGET="domestic:${DOMESTIC_S3_BUCKET}"
          if [ -n "$DOMESTIC_S3_PREFIX" ]; then
            TARGET="${TARGET}/${DOMESTIC_S3_PREFIX}"
          fi

          rclone sync dist "$TARGET" \
            --s3-no-check-bucket \
            --transfers 16 \
            --checkers 32 \
            --fast-list \
            --delete-excluded
